name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Smart Contract CI (Stellar Soroban)
  smart-contract:
    name: Smart Contract Build (Soroban)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Stellar CLI
        run: curl https://github.com/stellar/rs-soroban-cli/releases/download/v21.0.0/soroban-cli-21.0.0-x86_64-unknown-linux-gnu.tar.gz | tar xz

      - name: Build pool contract
        run: cd pool && cargo build --release --target wasm32-unknown-unknown

      - name: Build token contract
        run: cd token && cargo build --release --target wasm32-unknown-unknown
        
      - name: Verify build artifacts
        run: |
          ls -la pool/target/wasm32-unknown-unknown/release/
          ls -la token/target/wasm32-unknown-unknown/release/
          echo "✓ Soroban contracts built successfully"

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-contracts
          path: |
            contracts/pool/target/wasm32-unknown-unknown/release/
            contracts/token/target/wasm32-unknown-unknown/release/

  # Frontend CI
  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install root dependencies
        run: npm ci --prefix ..

      - name: Install frontend dependencies
        run: npm ci

      - name: Type checking
        run: npx tsc -b
        
      - name: Lint frontend code
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web/dist/

  # Integration tests (runs after both smart contract and frontend succeed)
  integration:
    name: Integration Verification
    runs-on: ubuntu-latest
    needs: [smart-contract, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --prefix web

      - name: Build frontend
        run: npm run -w web build

      - name: Verify build artifacts
        run: |
          [ -d web/dist ] && echo "✓ Frontend built successfully" || exit 1
          ls -la web/dist/ | head -20

      - name: Report success
        run: echo "🎉 All builds completed successfully (Soroban + React)"
